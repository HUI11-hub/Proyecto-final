<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Travels · Inicio de sesión</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    
    <script defer src="js/init.js"></script>
    <script defer src="js/login.js"></script>
</head>
<body>
    <main>
        <h1 class="title">Blue Travels</h1>

        <form>
            <h2>Inicio de sesión</h2>

            <section>
                <label for="inputEmail">Email:</label>
                <input class="textInput" id="inputEmail" type="email" name="inputEmail" placeholder="Introduce tu email">
            </section>

            <section>
                <label for="inputPassword">Contraseña:</label>
                <input class="textInput" id="inputPassword" type="password" name="inputPassword" placeholder="Introduce su contraseña">
            </section>

            <section>
                <button type="button" class="btnEnter" id="btnLogin">Iniciar sesión</button>
                <a href="newUser.html">
                    <button type="button" class="btnHighlight">Registrar</button>
                </a>
            </section>
        </form>
    </main>
</body>
</html>
