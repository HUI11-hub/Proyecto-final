<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Travels · Nuevo usuario</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <script defer src="js/init.js"></script>
    <script defer src="js/newUser.js"></script>
</head>
<body>
    <main>
        <h1 class="title">Blue Travels</h1>

        <form>
            <h2>Nuevo usuario</h2>

            <section>
                <label for="inputNewEmail">Email:</label>
                <input class="textInput" id="inputNewEmail" type="email" name="inputNewEmail" placeholder="Introduce un nuevo email">
            </section>

            <section>
                <label for="inputNewPassword">Contraseña nueva:</label>
                <input class="textInput" id="inputNewPassword" type="password" name="inputNewPassword" placeholder="Introduce su contraseña">
            </section>

            <section>
                <label for="inputVerifyPassword">Contraseña a verificar:</label>
                <input class="textInput" id="inputVerifyPassword" type="password" name="inputVerifyPassword" placeholder="Repite su contraseña para verificar">
            </section>

            <section>
                <button type="button" class="btnHighlight" id="btnCreateAccount">Crear cuenta</button>

                <a href="login.html">
                    <button type="button" class="btnCancel">Cancelar</button>
                </a>
            </section>
        </form>
    </main>
</body>
</html>
