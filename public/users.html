<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Travels · Usuarios y roles</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/main.css">
    <script defer src="js/main.js"></script>
    <script defer src="js/users.js"></script>
</head>
<body>
<header class="navBar">
    <div class="title">Blue Travels</div>
    <nav>
        <button class="navBtn" id="navTable"
            onclick="window.location.href='main.html'">Tablero</button>
        <button class="navBtn" id="navAdmin"
            onclick="window.location.href='admin.html'">Administración</button>
        <button class="navBtn" id="navUsers"
            onclick="window.location.href='users.html'">Usuarios y roles</button>
        <div class="separator"></div>
        <button class="navBtn" id="usernameText"
            onclick="window.location.href='perfil.html'">Nombre</button>
        <div class="rolBox">GESTOR</div>
        <div class="separator"></div>
        <button class="navBtn exit" id="exitBtn">Cerrar sesión</button>
    </nav>
</header>

<main>
    <h2>Gestión de usuarios y roles</h2>

    <div class="navOptions">
        <input
            class="textInput"
            type="search"
            id="searchUser"
            placeholder="Buscar por email..."
            oninput="filtrarUsuarios()"
            style="min-width: 260px;">
    </div>
    <hr>

    <div id="usersContainer">
        <p>Cargando usuarios...</p>
    </div>
</main>
</body>
</html>
